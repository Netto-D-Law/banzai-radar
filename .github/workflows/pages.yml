name: Publicar Dashboard

on:
  # Publica após cada coleta concluir. Usamos workflow_run (e não
  # 'on: push') porque o push feito pelo GITHUB_TOKEN do bot da coleta
  # NÃO dispara workflows 'on: push' — regra anti-recursão do GitHub.
  # Era exatamente isso que deixava o deploy sem rodar.
  workflow_run:
    workflows: ["Coleta de Preços"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Só publica se a coleta terminou com sucesso (ou disparo manual)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
