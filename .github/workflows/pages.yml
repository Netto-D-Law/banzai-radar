name: Publicar Dashboard

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

# Garante que só um deploy roda por vez — cancela o anterior
# se um novo push chegar antes de terminar (evita conflito de artefato)
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
