name: Coleta de Preços

on:
  schedule:
    # 09:17 / 15:17 / 21:17 BRT — minuto fora do topo da hora (menos fila)
    - cron: "17 9,15,21 * * *"
      timezone: America/Sao_Paulo
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Restaurar banco (Release db-latest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh release download db-latest --pattern radar.db --dir data --clobber \
            || echo "Sem release db-latest ainda — usa o banco do repo (se houver) ou comeca novo."

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar coleta
        run: python collect.py

      - name: Podar histórico > 60 dias e compactar
        run: |
          python - <<'PY'
          import sqlite3
          con = sqlite3.connect("data/radar.db")
          con.execute("DELETE FROM price_snapshots WHERE captured_at < datetime('now','-60 days')")
          con.commit()
          con.execute("VACUUM")
          con.close()
          print("Poda + VACUUM ok.")
          PY

      - name: Salvar banco na Release (primeiro — protege o histórico)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view db-latest >/dev/null 2>&1 \
            || gh release create db-latest --title "DB snapshot" --notes "Banco fora do git"
          gh release upload db-latest data/radar.db --clobber

      - name: Publicar dashboard na main (só data.json)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Banzai Radar Bot"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Atualiza preços [automated]"
          git pull --rebase --autostash origin main
          git push
