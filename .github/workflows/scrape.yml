name: Coleta de Preços

on:
  schedule:
    # Horários em UTC — 09:00, 15:00 e 21:00 horário de Brasília
    - cron: "0 12 * * *"   # 09:00 BRT
    - cron: "0 18 * * *"   # 15:00 BRT
    - cron: "0 0 * * *"    # 21:00 BRT
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

# Permissão necessária para o bot commitar o banco atualizado de volta
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar coleta
        run: python collect.py

      # Persiste o banco atualizado direto no repositório —
      # mais confiável que cache do Actions (que pode expirar)
      - name: Salvar banco de dados atualizado
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Banzai Radar Bot"
          git add data/radar.db
          git diff --staged --quiet || git commit -m "Atualiza preços [automated]"
          git push
